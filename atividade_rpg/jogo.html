<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <!-- Cabeçalho e título do RPG -->
                <div class="card-header text-center">
                    Nome do RPG - Criado por Joab
                </div>
                <!-- Tela Central do Jogo -->
                <div class="card-body" 
                style="background-image: url('assets/fundo.webp'); 
                       background-size: cover;">
                    <div class="row">
                        <!-- Status do Herói -->
                        <div class="col">
                            <ul class="list-group float-end text-center" style="width: 225px">
                                <li class="list-group-item"><strong>R-01</strong></li>
                                <li class="list-group-item">🤖 Robot</li>
                                <li class="list-group-item">
                                    ❤️
                                    <progress value="100" max="100" style="accent-color: red;"></progress>
                                </li>
                                <li class="list-group-item">
                                    🧪
                                    <progress  value="100" max="100"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress  value="0" max="100" style="accent-color: orange;"></progress>
                                </li>
                            </ul>
                        </div>
                        <!-- Status do Chefe -->
                        <div class="col">
                            <ul class="list-group float-start text-center" style="width: 225px">
                                <li class="list-group-item"><strong>Azog</strong></li>
                                <li class="list-group-item">👾 Orc</li>
                                <li class="list-group-item">
                                    ❤️
                                    <progress value="100" max="100" style="accent-color: red;"></progress>
                                </li>
                                <li class="list-group-item">
                                    🧪
                                    <progress  value="100" max="100"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress  value="0" max="100" style="accent-color: orange;"></progress>
                                </li>
                            </ul>
                        </div>
                    </div> <!-- fim do row -->
                    <div class="row">
                        <!-- IMG HERO -->
                         <div class="col text-end">
                            <img src="assets/hero.gif" width="200" height="200" />
                         </div>
                         <!-- IMG BOSS -->
                         <div class="col">
                            <img src="assets/boss.gif" width="300" height="300" />
                         </div>
                    </div>
                </div>
                <div class="card-footer text-center">
                    <small class="text-muted">Ações do herói</small>
                    <p></p>
                    <small class="text-muted">Ações do boss</small>
                </div>
            
            </div> <!-- fechamento do card -->
        </div> <!-- fechamento do container -->
    </body>
</html>
