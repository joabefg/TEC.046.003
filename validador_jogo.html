<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Professor - Validador</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 25px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 500px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #2ecc71; color: white; }
        .btn-finish { background: #3498db; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        tr:nth-child(even) { background: #f2f2f2; }
        .top-1 { background: #fff3cd !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador de Resultados</h2>
    <p>Cole o hash enviado pelo aluno abaixo:</p>
    <textarea id="hashInput" placeholder="Ex: Sm9hbyBTaWx2YXxTQ09SRTo4MH..."></textarea>
    
    <div class="controls">
        <button class="btn-add" onclick="processHash()">CONTINUAR (Próximo Hash)</button>
        <button class="btn-finish" onclick="showRanking()">FINALIZAR E RANKEAR</button>
    </div>

    <div id="status" style="color: #666; font-style: italic;">Aguardando dados...</div>

    <table id="rankingTable">
        <thead>
            <tr>
                <th>Posição</th>
                <th>Nome do Aluno</th>
                <th>Pontuação</th>
                <th>Status (HP)</th>
            </tr>
        </thead>
        <tbody id="rankingBody"></tbody>
    </table>
</div>

<script>
    let alunosRegistrados = [];

    function processHash() {
        const input = document.getElementById('hashInput');
        const hash = input.value.trim();
        
        if(!hash) return alert("Cole um código válido!");

        try {
            // Decodifica o Base64
            const decoded = atob(hash);
            // Formato: Nome|SCORE:X|HP:Y|AUTH2026
            const partes = decoded.split('|');

            if(partes.length < 4 || partes[3] !== "AUTH2026") {
                throw new Error("Código inválido ou falsificado!");
            }

            const nome = partes[0];
            const score = parseInt(partes[1].replace('SCORE:', ''));
            const hp = parseInt(partes[2].replace('HP:', ''));

            // Adiciona na nossa matriz/lista
            alunosRegistrados.push({ nome, score, hp });

            // Limpa e dá feedback
            input.value = "";
            document.getElementById('status').innerText = `✅ ${nome} adicionado com sucesso! (Total: ${alunosRegistrados.length})`;
            input.focus();

        } catch (e) {
            alert("Erro: O código colado não é válido ou foi alterado!");
        }
    }

    function showRanking() {
        if(alunosRegistrados.length === 0) return alert("Nenhum aluno registrado!");

        // Classificar por pontuação (Descendente)
        alunosRegistrados.sort((a, b) => b.score - a.score);

        const tbody = document.getElementById('rankingBody');
        tbody.innerHTML = "";

        alunosRegistrados.forEach((aluno, index) => {
            const row = tbody.insertRow();
            if(index === 0) row.className = "top-1";
            
            row.innerHTML = `
                <td>${index + 1}º</td>
                <td>${aluno.nome}</td>
                <td>${aluno.score}</td>
                <td>${aluno.hp > 0 ? 'Vivo' : 'Eliminado'}</td>
            `;
        });

        document.getElementById('rankingTable').style.display = "table";
        document.getElementById('status').innerText = "Ranking Final Gerado!";
    }
</script>

</body>
</html>
